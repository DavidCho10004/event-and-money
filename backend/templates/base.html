<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Event & Money{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav { background: #1a1a2e; padding: 12px 20px; }
        nav a { color: #eee; text-decoration: none; margin-right: 20px; font-size: 14px; }
        nav a:hover { color: #e94560; }
        nav .brand { font-weight: bold; font-size: 16px; }
        h1 { margin: 20px 0 10px; font-size: 22px; }
        h2 { margin: 15px 0 8px; font-size: 18px; }
        table { border-collapse: collapse; width: 100%; background: #fff; margin: 10px 0; }
        th, td { border: 1px solid #ddd; padding: 6px 10px; font-size: 13px; text-align: center; }
        th { background: #1a1a2e; color: #fff; font-weight: normal; }
        tr:hover { background: #f0f0f0; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #fff; }
        .badge-war { background: #e74c3c; }
        .badge-financial { background: #3498db; }
        .badge-pandemic { background: #9b59b6; }
        .badge-policy { background: #f39c12; }
        .badge-industry { background: #1abc9c; }
        .positive { color: #c0392b; font-weight: bold; }
        .negative { color: #2980b9; font-weight: bold; }
        .filter-bar { margin: 15px 0; }
        .filter-bar a {
            display: inline-block; padding: 5px 12px; margin: 2px;
            border: 1px solid #ccc; border-radius: 15px; font-size: 12px; color: #555;
        }
        .filter-bar a.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
        .back { font-size: 13px; margin: 10px 0; display: inline-block; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">Event & Money</a>
        <a href="/">사건 목록</a>
        <a href="/heatmap">히트맵</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
